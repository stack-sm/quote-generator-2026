<main
  class="flex flex-col items-center justify-center min-h-screen bg-[#313338] p-4 font-sans text-white"
>
  <div class="w-full max-w-md flex flex-col items-center space-y-6">
    @if (activeQuote(); as quote) {
      <div
        class="w-full min-h-[250px] flex flex-col p-6 bg-[#2b2d31] rounded-lg shadow-lg border border-[#1e1f22]/50 transition-all duration-300"
      >
        <div class="flex-grow flex items-center justify-center">
          <p
            class="text-xl font-medium text-[#dbdee1] text-center leading-relaxed font-sans italic"
          >
            "{{ quote.text }}"
          </p>
        </div>

        <cite class="mt-4 block text-right text-sm text-[#b5bac1] font-medium not-italic">
          — {{ quote.author }}
        </cite>
      </div>
    } @else if (quoteService.quotesResource.error()) {
      <div
        class="w-full min-h-[250px] flex flex-col items-center justify-center p-6 bg-[#2b2d31] rounded-lg border-2 border-dashed border-[#f23f43]/50"
      >
        <div class="text-5xl mb-4">🛰️</div>
        <h3 class="text-[#f23f43] font-bold text-lg">404: Inspiration Not Found</h3>
        <p class="text-[#b5bac1] text-center text-sm mt-2">
          The quotes are hiding in a different channel. <br />
          Try checking your connection or permissions.
        </p>
        <button
          (click)="handleRefresh()"
          class="mt-6 px-6 py-2 bg-[#4e5058] hover:bg-[#6d6f78] text-white text-sm font-medium rounded-[3px] transition-colors shadow-sm"
        >
          Try Reconnecting
        </button>
      </div>
    } @else {
      <div class="w-full min-h-[250px] ..."></div>
    }

    <button
      mat-flat-button
      class="w-full sm:w-auto px-8 py-3 !bg-[#5865f2] !text-white hover:!bg-[#4752c4] rounded-[3px] font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      (click)="updateQuote()"
      [disabled]="quoteService.quotesResource.error() || quoteService.quotesResource.isLoading()"
    >
      Get Amazing Quote
    </button>
  </div>
</main>
